<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login Page</title>
    <script src="https://kit.fontawesome.com/92b1a37389.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loginPage">
        <div class="gymTitle">
            <div class="gymLogo"></div>
            <div class="title">
                <div class="gymName">ENDURANCE</div>
                <div class="description">Gym Management System</div>
            </div>
        </div>
        <div class="welcome">Welcome Back!</div>
        <div class="signIn">Please login to your account</div>
        <div class="inputBox1">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="Email Address" name="Email Address" id="mail">
        </div>
        <div class="inputBox2">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Password" name="Password" id="password">
        </div>
        <div class="loginButton">Login</div>
        <div class="forgot">Forgot Password?</div>
        <div class="noAccount">Don't have an account?<span>Sign up</span></div>
    </div>
</body>
</html>
